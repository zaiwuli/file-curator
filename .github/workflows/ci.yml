name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install backend and development tools
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest --cov=file_curator --cov-report=term-missing
      - name: Verify OpenAPI contract
        run: |
          python ../../scripts/export_openapi.py
          git diff --exit-code -- ../../packages/contracts/openapi.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  container:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate Compose configuration
        run: docker compose --env-file .env.example config --quiet
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: file-curator:ci
          build-args: |
            FILE_CURATOR_VERSION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: file-curator:ci
          format: spdx-json
          output-file: file-curator.spdx.json
      - name: Scan image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: file-curator:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - uses: actions/upload-artifact@v4
        with:
          name: file-curator-sbom
          path: file-curator.spdx.json

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install backend
        working-directory: apps/api
        run: pip install -e ".[dev]"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend and Chromium
        working-directory: apps/web
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run desktop end-to-end tests
        working-directory: apps/web
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
