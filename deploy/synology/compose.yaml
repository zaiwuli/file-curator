name: file-curator

services:
  file-curator:
    image: ${FILE_CURATOR_IMAGE:-ghcr.io/zaiwuli/file-curator:latest}
    container_name: file-curator
    user: "${PUID}:${PGID}"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      FILE_CURATOR_BASE_PATH: ${FILE_CURATOR_BASE_PATH:-/}
      FILE_CURATOR_DATABASE_URL: sqlite:////config/file-curator.db
      FILE_CURATOR_LOG_LEVEL: ${FILE_CURATOR_LOG_LEVEL:-INFO}
      FILE_CURATOR_WEBHOOK_URL: ${FILE_CURATOR_WEBHOOK_URL:-}
      FILE_CURATOR_WORKERS: "1"
    ports:
      - "${FILE_CURATOR_PORT:-8080}:8080"
    volumes:
      - ${CONFIG_PATH}:/config
      - ${SOURCES_PATH}:/sources
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/live',timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
